# Coturn TURN/STUN config for Matrix WebRTC voice calls.
# Mount into the coturn container at /etc/turnserver.conf (see compose template).
# Replace SERVER_IP with your PUBLIC routable IP and mint the shared secret.
# This file holds a secret → mode 600, never commit the filled-in version.

listening-port=3478
tls-listening-port=4443

# TLS certs (e.g. issued by Caddy / your ACME setup)
cert=/certs/origin.pem
pkey=/certs/origin-key.pem

realm=matrix.example.com

# UDP relay range — MUST be open end-to-end on host + upstream NAT, or audio dies.
min-port=10000
max-port=10100

# THE PUBLIC IP coturn advertises. The single most common misconfig.
# Must be the real routable IP, NOT a domain behind a CDN/Cloudflare.
external-ip=SERVER_IP

# Long-term credential mechanism shared with Dendrite's client_api.turn.turn_shared_secret
use-auth-secret
static-auth-secret=<generate-with-gen-secrets.sh>

# Hardening
fingerprint
no-loopback-peers
no-multicast-peers
no-cli
# stale-nonce
# no-tcp-relay

# Logging
log-file=/var/log/turnserver.log
syslog
verbose
